name: Hive-Queen

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write   # needed to update config.json

jobs:
  # ----- Worker Bees (19 instances) -----
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3, 4, 5]
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: Download llama.cpp RPC server
        run: |
          # Download pre-built llama-server (or build from source)
          curl -Lo llama-server https://github.com/ggerganov/llama.cpp/releases/download/b4193/llama-server
          chmod +x llama-server

      - name: Download bore
        run: |
          curl -Lo bore https://github.com/ekzhang/bore/releases/download/v0.5.0/bore
          chmod +x bore

      - name: Start RPC server and bore tunnel
        id: worker
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          CHAT_REPO: ${{ github.repository_owner }}/chat
        run: |
          # Start llama.cpp RPC server on port 65432
          ./llama-server --rpc-server --port 65432 &
          sleep 2

          # Start bore tunnel
          ./bore local 65432 --to bore.pub 2>&1 | tee bore.log &

          # Wait for bore to assign a public URL
          for i in {1..30}; do
            BORE_URL=$(grep -oP 'bore\.pub:\d+' bore.log | head -1)
            if [ -n "$BORE_URL" ]; then
              echo "Bore URL: $BORE_URL"
              break
            fi
            sleep 2
          done

          if [ -z "$BORE_URL" ]; then
            echo "Failed to get bore URL"
            exit 1
          fi

          # Register this worker with config.json (retry on conflict)
          for attempt in {1..5}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha')
            CURRENT=$(echo "$FILE_INFO" | jq -r '.content' | base64 -d)
            if [ -z "$CURRENT" ]; then
              echo '{"runners":[]}' > current.json
            else
              echo "$CURRENT" > current.json
            fi
            # Add new URL if not already present
            jq --arg url "$BORE_URL" '.runners += [$url]' current.json > new.json
            ENCODED=$(base64 -w0 < new.json)
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" \
              -d "{\"message\":\"register worker ${{ matrix.instance }}\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}")
            if echo "$RESPONSE" | jq -e '.commit' > /dev/null; then
              echo "Registered worker ${{ matrix.instance }}"
              break
            fi
            sleep 2
          done

          # Keep the worker alive
          sleep infinity

  # ----- Queen (1 instance) -----
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: worker   # optional: starts after workers, but workers run forever; queen will start after worker jobs are all running (they never finish, so we should not use needs; we can remove needs or use it with caution)
    # Actually, since workers run indefinitely, the queen would never start if we use `needs`. So we should not use needs.
    # Instead, we let queen run concurrently and poll config.json.
    # Remove the `needs` line:
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: Download llama.cpp CLI
        run: |
          curl -Lo llama-cli https://github.com/ggerganov/llama.cpp/releases/download/b4193/llama-cli
          chmod +x llama-cli

      - name: Download model (e.g., Granite Tiny)
        run: |
          # We need a GGUF model file; for demo, download a small one
          curl -Lo model.gguf https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF/resolve/main/granite-4.0-h-tiny-distill-opus-4.5-think-q4_k_m.gguf

      - name: Queen – discover workers and run inference
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          CHAT_REPO: ${{ github.repository_owner }}/chat
        run: |
          # Poll config.json until we have 19 workers
          MAX_WORKERS=19
          for i in {1..60}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json")
            RUNNERS=$(echo "$FILE_INFO" | jq -r '.content' | base64 -d | jq -r '.runners[]')
            COUNT=$(echo "$RUNNERS" | grep -c . || true)
            echo "Found $COUNT workers"
            if [ "$COUNT" -ge "$MAX_WORKERS" ]; then
              break
            fi
            sleep 5
          done

          # Build the RPC connection string
          RPC_ARGS=$(echo "$RUNNERS" | sed 's/^/--rpc /' | tr '\n' ',' | sed 's/,$//')

          echo "RPC_ARGS: $RPC_ARGS"

          # Run inference with tensor parallelism across all workers
          ./llama-cli -m model.gguf $RPC_ARGS -p "What is the capital of France?" -n 100

          # Keep the queen alive (it could also serve as an API endpoint, but for now just runs once)
          sleep infinity
