name: Server

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ----- 1. Check disk space (optional) -----
      - name: Check disk space
        run: df -h /

      # ----- 2. Cache: Ollama Models (Q4_K_M) -----
      - uses: actions/cache@v4
        id: ollama
        with:
          path: ~/.ollama/models
          key: ollama-distilled-tiny-q4km
          restore-keys: ollama-

      # ----- 3. Cache: Docker image for Open WebUI -----
      - name: Cache Open WebUI Docker image
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/open-webui.tar
          key: openwebui-image-${{ hashFiles('.github/workflows/server.yml') }}
          restore-keys: openwebui-image-

      # ----- 4. Setup Ollama (only on cache miss) -----
      - if: steps.ollama.outputs.cache-hit != 'true'
        uses: ai-action/setup-ollama@v2

      # ----- 5. Pull Q4_K_M model (only on cache miss) -----
      - if: steps.ollama.outputs.cache-hit != 'true'
        run: ollama pull hf.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF:Q4_K_M

      # ----- 6. Save Ollama cache (only on cache miss) -----
      - if: steps.ollama.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ollama/models
          key: ollama-distilled-tiny-q4km

      # ----- 7. Load or pull Open WebUI Docker image -----
      - name: Load Docker image
        run: |
          if [ -f /tmp/open-webui.tar ]; then
            echo "Loading cached Docker image..."
            docker load -i /tmp/open-webui.tar
          else
            echo "Pulling Open WebUI image..."
            docker pull ghcr.io/open-webui/open-webui:main
            docker save ghcr.io/open-webui/open-webui:main -o /tmp/open-webui.tar
          fi

      # ----- 8. Cache: Cloudflared -----
      - uses: actions/cache@v4
        id: cloudflared
        with:
          path: ./cloudflared
          key: cloudflared
          restore-keys: cloudflared-

      # ----- 9. Download Cloudflared (only on cache miss) -----
      - if: steps.cloudflared.outputs.cache-hit != 'true'
        run: |
          curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # ----- 10. Save Cloudflared cache (only on cache miss) -----
      - if: steps.cloudflared.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./cloudflared
          key: cloudflared

      # ----- 11. Save Docker image cache (only if we pulled it) -----
      - name: Save Docker image cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker save ghcr.io/open-webui/open-webui:main -o /tmp/open-webui.tar

      # ----- 12. Main: Run Ollama, Open WebUI, Tunnel, Update Config, Self‑Replicate -----
      - name: Run and Replicate
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          OLLAMA_HOST: 0.0.0.0:11434
        run: |
          set -e

          echo "🚀 Starting Ollama server..."
          pkill -f ollama 2>/dev/null || true
          ollama serve &

          # Wait for Ollama
          echo "⏳ Waiting for Ollama..."
          for i in {1..20}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "✅ Ollama is ready"
              break
            fi
            echo "⏳ Attempt $i/20 ..."
            sleep 2
          done

          if ! curl -s http://localhost:11434/api/tags > /dev/null; then
            echo "❌ Ollama failed to start"
            exit 1
          fi

          # Ensure model is available (pull is idempotent)
          echo "📦 Ensuring model is present..."
          ollama pull hf.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF:Q4_K_M

          # ----- Start Open WebUI (Docker, port 3000) -----
          echo "🐳 Starting Open WebUI container..."
          docker rm -f open-webui 2>/dev/null || true
          docker run -d \
            --name open-webui \
            -p 3000:8080 \
            -e OLLAMA_BASE_URL=http://host.docker.internal:11434 \
            -v open-webui-data:/app/backend/data \
            ghcr.io/open-webui/open-webui:main

          # Wait for Open WebUI
          echo "⏳ Waiting for Open WebUI..."
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Open WebUI is ready"
              break
            fi
            echo "⏳ Attempt $i/20 ..."
            sleep 2
          done

          if ! curl -s http://localhost:3000 > /dev/null; then
            echo "❌ Open WebUI failed to start"
            docker logs open-webui --tail 20
            exit 1
          fi

          # ----- Start Cloudflare tunnel -----
          echo "🌐 Starting Cloudflare tunnel..."
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ./cloudflared tunnel --protocol http2 --url http://localhost:3000 2>&1 | tee tunnel.log &

          # Extract tunnel URL
          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: ${TUNNEL_URL}"
              break
            fi
            echo "⏳ Attempt $i/30 ..."
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            tail -20 tunnel.log
            exit 1
          fi

          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # ----- Update config.json -----
          echo "📝 Updating frontend config..."
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl: $url}')
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            PAYLOAD=$(jq -n \
              --arg msg "update API URL" \
              --arg content "$ENCODED" \
              --arg sha "$SHA" \
              --arg name "github-actions[bot]" \
              --arg email "github-actions[bot]@users.noreply.github.com" \
              '{message: $msg, content: $content, sha: $sha, author: {name: $name, email: $email}, committer: {name: $name, email: $email}}')
          else
            PAYLOAD=$(jq -n \
              --arg msg "add API URL" \
              --arg content "$ENCODED" \
              --arg name "github-actions[bot]" \
              --arg email "github-actions[bot]@users.noreply.github.com" \
              '{message: $msg, content: $content, author: {name: $name, email: $email}, committer: {name: $name, email: $email}}')
          fi

          curl -s -X PUT -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" \
            -d "$PAYLOAD"

          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # ----- Self‑replication loop -----
          echo "🔄 Entering self‑replication loop..."
          START_TIME=$(date +%s)
          TRIGGER_AT=$((350 * 60))
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "⏰ Triggering replacement workflow..."
              curl -X POST -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"${{ github.ref }}"}'
              TRIGGERED=true
            fi

            # Health checks
            if ! curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "⚠️ Ollama down – restarting..."
              pkill -f ollama 2>/dev/null || true
              ollama serve &
              sleep 5
            fi

            if ! pgrep -f cloudflared > /dev/null; then
              echo "⚠️ Tunnel down – restarting..."
              ./cloudflared tunnel --protocol http2 --url http://localhost:3000 2>&1 | tee -a tunnel.log &
            fi

            if ! curl -s http://localhost:3000 > /dev/null; then
              echo "⚠️ Open WebUI down – restarting container..."
              docker rm -f open-webui 2>/dev/null || true
              docker run -d \
                --name open-webui \
                -p 3000:8080 \
                -e OLLAMA_BASE_URL=http://host.docker.internal:11434 \
                -v open-webui-data:/app/backend/data \
                ghcr.io/open-webui/open-webui:main
              sleep 5
            fi

            sleep 30
          done
