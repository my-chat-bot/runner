name: P2P Inference Swarm (Request-Routing)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  # Known-good small model. Once this works, swap in your Granite GGUF.
  MODEL_URL: "https://huggingface.co/bartowski/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf"

jobs:

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workers registry exists
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          EMPTY=$(printf '' | base64 -w0)
          curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/workers/.keep" > /tmp/keep.json || true
          SHA=$(jq -r '.sha // empty' /tmp/keep.json)
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/.keep" \
              -d "{\"message\":\"ensure workers dir\",\"content\":\"$EMPTY\",\"sha\":\"$SHA\"}" || true
          else
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/.keep" \
              -d "{\"message\":\"create workers dir\",\"content\":\"$EMPTY\"}" || true
          fi

  worker:
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3, 4, 5]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake git nodejs npm openssl psmisc netcat-traditional

      - name: Install Holesail
        run: sudo npm install -g holesail

      - name: Build llama-server
        run: |
          set -e
          curl -Lo llama.cpp.zip "https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9850.zip"
          unzip -q llama.cpp.zip
          cd llama.cpp-b9850
          mkdir -p build && cd build
          cmake .. -DGGML_RPC=OFF -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-server
          cp bin/llama-server ../../
          cd ../..

      - name: Download model
        run: |
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3 --retry-delay 2
          [ "$(head -c 4 model.gguf)" = "GGUF" ] || { echo "❌ Invalid GGUF"; exit 1; }

      - name: Start llama-server and Holesail server
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          INSTANCE_ID: ${{ matrix.instance }}
        run: |
          set -e
          PORT=50052
          mkdir -p logs

          echo "🐝 Worker $INSTANCE_ID starting llama-server..."
          nohup ./llama-server \
            -m model.gguf \
            --port ${PORT} \
            --host 127.0.0.1 \
            -c 2048 \
            -np 2 \
            --timeout 120 \
            > logs/llama.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -fs --max-time 2 "http://127.0.0.1:${PORT}/health" >/dev/null 2>&1; then
              echo "✅ llama-server healthy on port ${PORT}"
              break
            fi
            if ! pgrep -f "llama-server" >/dev/null; then
              echo "❌ llama-server died"
              cat logs/llama.log
              exit 1
            fi
            sleep 1
          done

          echo "🔗 Starting Holesail server on port ${PORT}..."
          rm -f /tmp/holesail_output.txt
          holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
          sleep 10

          CONNECTION_STRING=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1)
          if [ -z "${CONNECTION_STRING}" ]; then
            echo "❌ Failed to get Holesail connection string"
            cat /tmp/holesail_output.txt
            exit 1
          fi
          echo "✅ Worker $INSTANCE_ID connection string: ${CONNECTION_STRING}"

          register_worker() {
            local url="$1"
            local file="workers/hole${INSTANCE_ID}.json"
            mkdir -p workers
            echo "{\"url\":\"${url}\",\"ts\":$(date +%s)}" > "${file}"
            ENCODED=$(base64 -w0 "${file}")

            for attempt in $(seq 1 15); do
              local info sha payload response status
              info=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/${file}") || true
              sha=$(echo "$info" | jq -r '.sha // empty' 2>/dev/null)

              if [ -n "$sha" ]; then
                payload=$(jq -n --arg msg "worker ${INSTANCE_ID} update" \
                  --arg content "$ENCODED" --arg sha "$sha" \
                  '{message:$msg,content:$content,sha:$sha}')
              else
                payload=$(jq -n --arg msg "worker ${INSTANCE_ID} register" \
                  --arg content "$ENCODED" \
                  '{message:$msg,content:$content}')
              fi

              response=$(curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/${file}" \
                -d "$payload") || true

              if echo "$response" | jq -e '.content' >/dev/null 2>&1; then
                echo "✅ Worker $INSTANCE_ID registered"
                return 0
              fi

              status=$(echo "$response" | jq -r '.status // empty' 2>/dev/null)
              if [ "$status" = "409" ]; then
                echo "⚠️ Conflict, retrying..."
                sleep 3
                continue
              fi
              echo "❌ Registration failed: $response"
              return 1
            done
          }

          register_worker "${CONNECTION_STRING}"

          LAST_KEY="${CONNECTION_STRING}"
          while true; do
            sleep 30

            if ! pgrep -f "llama-server" >/dev/null; then
              echo "⚠️ llama-server died — restarting..."
              nohup ./llama-server \
                -m model.gguf \
                --port ${PORT} \
                --host 127.0.0.1 \
                -c 2048 \
                -np 2 \
                --timeout 120 \
                > logs/llama.log 2>&1 &
              sleep 5
            fi

            if ! pgrep -f "holesail --live ${PORT}" >/dev/null; then
              echo "⚠️ Holesail died — restarting..."
              rm -f /tmp/holesail_output.txt
              holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
              sleep 10
              CURRENT_KEY=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1 || true)
              if [ -n "$CURRENT_KEY" ] && [ "$CURRENT_KEY" != "$LAST_KEY" ]; then
                echo "🔄 Key changed, re-registering..."
                register_worker "$CURRENT_KEY"
                LAST_KEY="$CURRENT_KEY"
              fi
            fi
          done

  queen:
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake git nodejs npm nginx netcat-traditional

      - name: Install Holesail
        run: sudo npm install -g holesail

      - name: Build llama-server
        run: |
          set -e
          curl -Lo llama.cpp.zip "https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9850.zip"
          unzip -q llama.cpp.zip
          cd llama.cpp-b9850
          mkdir -p build && cd build
          cmake .. -DGGML_RPC=OFF -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-server
          cp bin/llama-server ../../
          cd ../..

      - name: Download model
        run: |
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3 --retry-delay 2
          [ "$(head -c 4 model.gguf)" = "GGUF" ] || { echo "❌ Invalid GGUF"; exit 1; }

      - name: Wait for workers and collect Holesail URLs
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          EXPECTED: "5"
        run: |
          set -e
          for attempt in $(seq 1 60); do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null || true)
            FILES=$(echo "$RESPONSE" | jq -r '.[]? | select(.type=="file" and (.name | startswith("hole"))) | .name' 2>/dev/null || true)
            COUNT=$(echo "$FILES" | grep -c . || echo 0)
            echo "  Attempt $attempt: $COUNT / ${EXPECTED} workers"
            [ "$COUNT" -ge "${EXPECTED}" ] && break
            sleep 5
          done
          [ "$COUNT" -ge "${EXPECTED}" ] || { echo "❌ Timeout waiting for workers"; exit 1; }

          URLS=""
          for f in $FILES; do
            U=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/${REPO}/contents/workers/$f" | \
                jq -r '.content' | base64 -d | jq -r '.url' 2>/dev/null)
            [ -n "$U" ] && [ "$U" != "null" ] || continue
            [ -z "$URLS" ] && URLS="$U" || URLS="$URLS,$U"
          done
          [ -n "$URLS" ] || { echo "❌ No valid worker URLs"; exit 1; }
          echo "HOLESAIL_URLS=$URLS" >> $GITHUB_ENV

      - name: Open Holesail clients and configure Nginx
        env:
          HOLESAIL_URLS: ${{ env.HOLESAIL_URLS }}
        run: |
          set -e
          mkdir -p logs
          IFS=',' read -ra URLS <<< "${HOLESAIL_URLS}"

          BASE=60000
          UPSTREAM=""
          i=0
          for url in "${URLS[@]}"; do
            port=$((BASE + i))
            echo "🔗 Holesail client $i: $url → 127.0.0.1:$port"
            nohup holesail "$url" --port $port > logs/holesail_$i.log 2>&1 &

            for t in $(seq 1 50); do
              nc -z 127.0.0.1 $port && break
              sleep 1
            done

            if ! nc -z 127.0.0.1 $port; then
              echo "❌ Holesail client $i did not open port $port"
              cat logs/holesail_$i.log
              exit 1
            fi

            # Also ensure the upstream llama-server responds through the tunnel.
            for t in $(seq 1 30); do
              if curl -fs --max-time 3 "http://127.0.0.1:$port/health" >/dev/null 2>&1; then
                echo "  ✅ llama-server reachable via port $port"
                break
              fi
              sleep 1
            done

            UPSTREAM="${UPSTREAM}    server 127.0.0.1:$port max_fails=2 fail_timeout=15s;\n"
            i=$((i + 1))
          done

          echo "🚀 Configuring Nginx..."
          sudo tee /etc/nginx/sites-available/default > /dev/null <<EOF
          upstream llama_swarm {
              least_conn;
          ${UPSTREAM}
          }

          server {
              listen 8080 default_server;
              access_log /var/log/nginx/queen_access.log;
              error_log /var/log/nginx/queen_error.log;

              proxy_connect_timeout 10s;
              proxy_send_timeout 120s;
              proxy_read_timeout 120s;

              location / {
                  proxy_pass http://llama_swarm;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_buffering off;
              }
          }
          EOF

          sudo nginx -t
          sudo systemctl restart nginx || sudo nginx -s reload || sudo service nginx restart
          echo "✅ Nginx listening on port 8080"

          # Wait for Nginx to pass requests through.
          for i in $(seq 1 20); do
            if curl -fs --max-time 3 http://localhost:8080/health >/dev/null 2>&1; then
              echo "✅ Nginx health check passed"
              break
            fi
            sleep 1
          done

      - name: Start Cloudflare tunnel
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -e
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi

          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > logs/tunnel.log 2>&1 &

          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' logs/tunnel.log | head -1 || true)
            [ -n "$TUNNEL_URL" ] && break
            sleep 3
          done

          [ -n "$TUNNEL_URL" ] || {
            echo "❌ Failed to get tunnel URL"
            tail -100 logs/tunnel.log
            exit 1
          }

          echo "✅ Tunnel URL: $TUNNEL_URL"
          echo "::notice::Public API: $TUNNEL_URL"
          echo "::notice::Chat completions: $TUNNEL_URL/v1/chat/completions"

          CHAT_REPO="${{ github.repository_owner }}/chat"
          CFG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl:$url}')
          ENC=$(echo "$CFG" | base64 -w0)
          INFO=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" || true)
          SHA=$(echo "$INFO" | jq -r '.sha // empty' 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            PAYLOAD=$(jq -n --arg msg "update API URL" --arg content "$ENC" --arg sha "$SHA" \
              '{message:$msg,content:$content,sha:$sha}')
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" -d "$PAYLOAD"
          fi

      - name: Keep alive and monitor
        run: |
          while pgrep -x nginx >/dev/null; do
            if ! curl -fs --max-time 5 http://localhost:8080/health >/dev/null 2>&1; then
              echo "⚠️ Nginx/health check failed at $(date -Iseconds)"
              tail -50 /var/log/nginx/queen_error.log 2>/dev/null || true
            fi
            sleep 30
          done
          echo "❌ Nginx died"
          exit 1
